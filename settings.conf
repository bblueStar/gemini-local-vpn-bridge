# Change these two settings for your own VPN client.
# Find the VPN core process with: pgrep -alf 'your-vpn-name'
VPN_PROCESS_PATTERN='/Applications/YourVPN.app/Contents/Resources/your-vpn-core'

# Find the local SOCKS port in your VPN client's settings or with:
# lsof -nP -iTCP -sTCP:LISTEN
VPN_SOCKS_HOST='127.0.0.1'
VPN_SOCKS_PORT=1080
