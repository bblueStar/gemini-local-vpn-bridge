# Change these settings for your own VPN client.
# Find the VPN core process with: pgrep -alf 'your-vpn-name'
VPN_PROCESS_PATTERN='/Applications/YourVPN.app/Contents/Resources/your-vpn-core'

# Find the local SOCKS port in your VPN client's settings or with:
# lsof -nP -iTCP -sTCP:LISTEN
VPN_SOCKS_HOST='127.0.0.1'
VPN_SOCKS_PORT=1080

# The bridge starts only when this URL can actually be reached through SOCKS.
# Keep the URL HTTPS and free of account-specific parameters.
VPN_HEALTHCHECK_URL='https://www.gstatic.com/generate_204'
